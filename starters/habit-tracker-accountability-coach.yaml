id: habit-tracker-accountability-coach
version: 1
name: Habit Tracker & Accountability Coach
description: You've tried every habit tracker app out there. They all work for a
  week, then you stop opening them. The problem isn't the app — it's that
  tracking habits is passive. What if your agent actively reached out to you,
  asked how your day went, and adapted its approach based on whether you're on a
  streak or falling off?
source_usecase: Habit Tracker & Accountability Coach
source_path: ../awesome-openclaw-usecases/usecases/habit-tracker-accountability-coach.md
entry_team: personal-assistant
packs:
  - personal-assistant
project_skills:
  - malaclaw-cook
  - brainz-tasks
  - apple-reminders
installable_skills:
  - publora-telegram
tags:
  - automation
  - habit
  - tracker
  - accountability
  - coach
required_apis:
  - Telegram or SMS integration (Twilio for SMS, or Telegram Bot API)
  - "Optional: Google Sheets integration for a visual habit dashboard"
  - Telegram Bot API
  - Twilio SMS API
  - Google Sheets API
required_capabilities:
  - Scheduling / cron for timed check-ins
external_requirements:
  - Telegram or SMS integration (Twilio for SMS, or Telegram Bot API)
  - Scheduling / cron for timed check-ins
  - File system or database access for storing habit data
  - "Optional: Google Sheets integration for a visual habit dashboard"
bootstrap_prompt: Start the Habit Tracker & Accountability Coach demo project
  from the malaclaw starter `habit-tracker-accountability-coach`. You've
  tried every habit tracker app out there. They all work for a week, then you
  stop opening them. The problem isn't the app — it's that tracking habits is
  passive. What if your agent actively reached out to you, asked how your day
  went, and adapted its approach based on whether you're on a streak or falling
  off? Use `autonomous-startup` as the initial entry team. Review STARTER.md,
  confirm any missing external integrations, then break the work into clear team
  tasks.
