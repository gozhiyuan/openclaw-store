id: meeting-notes-action-items
version: 1
name: Automated Meeting Notes & Action Items
description: You just finished a 45-minute team call. Now you need to write up
  the summary, pull out action items, and distribute them to Jira, Linear, or
  Todoist — manually. By the time you're done, the next meeting is starting.
  What if your agent handled all of that the moment the transcript lands?
source_usecase: Automated Meeting Notes & Action Items
source_path: ../awesome-openclaw-usecases/usecases/meeting-notes-action-items.md
