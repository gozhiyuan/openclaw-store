  - fetch or curl for webhook calls
  - Docker (if using the pre-configured stack)
  - n8n credential management (manual, one-time setup per integration)
bootstrap_prompt: Start the OpenClaw + n8n Workflow Orchestration demo project
  from the openclaw-store starter `n8n-workflow-orchestration`. Letting your AI
  agent directly manage API keys and call external services is a recipe for
  security incidents. Every new integration means another credential in
  `.env.local`, another surface for the agent to accidentally leak or misuse.
  Use `dev-company` as the initial entry team. Review STARTER.md, confirm any
  missing external integrations, then break the work into clear team tasks.
