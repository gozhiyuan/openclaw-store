id: aionui-cowork-desktop
version: 1
name: OpenClaw as Desktop Cowork (AionUi) — Remote Rescue & Multi-Agent Hub
description: Use OpenClaw from a desktop Cowork UI, access it from Telegram or
  WebUI when you’re away, and fix it remotely when it won’t connect. AionUi is a
  free, open-source app that runs **OpenClaw as a first-class agent** alongside
  12+ others (Claude Code, Codex, Qwen Code, etc.), with a built-in **OpenClaw
  deployment expert** for install, diagnose, and repair — including **remote
  rescue** when OpenClaw is down and you’re not at the machine.
