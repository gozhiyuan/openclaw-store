id: podcast-production-pipeline
version: 1
name: Podcast Production Pipeline
description: You have a podcast idea, maybe even a backlog of episode topics.
  But between researching guests, writing outlines, drafting intros, generating
  show notes, and writing social media posts for promotion — the production
  overhead kills your momentum. What if you handed off a topic and got back a
  full production package?
source_usecase: Podcast Production Pipeline
