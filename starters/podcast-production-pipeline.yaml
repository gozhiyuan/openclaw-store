  - "Optional: RSS feed skill (for monitoring competitor podcasts)"
bootstrap_prompt: Start the Podcast Production Pipeline demo project from the
  malaclaw starter `podcast-production-pipeline`. You have a podcast idea,
  maybe even a backlog of episode topics. But between researching guests,
  writing outlines, drafting intros, generating show notes, and writing social
  media posts for promotion — the production overhead kills your momentum. What
  if you handed off a topic and got back a full production package? Use
  `content-factory` as the initial entry team. Review STARTER.md, confirm any
  missing external integrations, then break the work into clear team tasks.
