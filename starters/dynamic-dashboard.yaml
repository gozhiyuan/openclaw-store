id: dynamic-dashboard
version: 1
name: Dynamic Dashboard with Sub-agent Spawning
description: Static dashboards show stale data and require constant manual
  updates. You want real-time visibility across multiple data sources without
  building a custom frontend or hitting API rate limits.
source_usecase: Dynamic Dashboard with Sub-agent Spawning
source_path: ../awesome-openclaw-usecases/usecases/dynamic-dashboard.md
entry_team: data-ops
packs:
  - data-ops
project_skills:
  - malaclaw-manager
  - duckdb-en
installable_skills:
  - nocodb
  - github
tags:
  - development
  - dynamic
  - dashboard
required_apis:
  - web_search or web_fetch for external APIs
  - Discord or Canvas for rendering the dashboard
required_capabilities:
  - github (gh CLI) for GitHub metrics
  - Cron jobs for scheduled updates
external_requirements:
  - Sub-agent spawning for parallel execution
  - github (gh CLI) for GitHub metrics
  - bird (Twitter) for social data
  - web_search or web_fetch for external APIs
  - postgres for storing historical metrics
  - Discord or Canvas for rendering the dashboard
  - Cron jobs for scheduled updates
bootstrap_prompt: Start the Dynamic Dashboard with Sub-agent Spawning demo
  project from the malaclaw starter `dynamic-dashboard`. Static dashboards
  show stale data and require constant manual updates. You want real-time
  visibility across multiple data sources without building a custom frontend or
  hitting API rate limits. Use `dev-company` as the initial entry team. Review
  STARTER.md, confirm any missing external integrations, then break the work
  into clear team tasks.
