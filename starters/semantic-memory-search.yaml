bootstrap_prompt: Start the Semantic Memory Search demo project from the
  openclaw-store starter `semantic-memory-search`. OpenClaw's built-in memory
  system stores everything as markdown files — but as memories grow over weeks
  and months, finding that one decision from last Tuesday becomes impossible.
  There is no search, just scrolling through files. Use `research-lab` as the
  initial entry team. Review STARTER.md, confirm any missing external
  integrations, then break the work into clear team tasks.
